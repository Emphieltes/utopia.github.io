<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Utopia Parser</title>

  <style>
    :root {
      --bg: #32373b;
      --text: #e0e0e0;
      --text-muted: #a0a0a0;
      --surface: #3a3f44;
      --surface-hover: #43484e;
      --border: #4a5057;
      --accent: #4fc3f7;
      --accent-dark: #3aa0d8;
      --success: #4ade80;
      --danger: #ff6b6b;
      --warning: #ff9f43;
      --gold: #d4af37;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html, body {
        margin: 0;
        padding: 0;
        box-sizing: border-box; /* ensures no padding/margin surprises */
        width: 100%;
        min-height: 100vh;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      overflow-x: auto;
    }

    /* Main content wrapper – this is what you'll position */
    .planner-container {
      padding-top: 10px;
      padding-right: 40px;
      padding-bottom: 40px;
      padding-left: 60px;     /* Moves everything left or right */
      max-width: none;
      margin: 0;
      transition: margin-left 0.3s ease;
    }

    /* Header section – easy to move up/down/left/right */
    .header-section {
    margin-left: 0px;
    }

    h1 {
      color: var(--text);
      margin: 0 0 8px 0;
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

.settings-btn {
  position: fixed;
  top: 16px;
  right: 20px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1px solid var(--bg);
  background: var(--bg);
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10001;

  transition: all 0.2s ease;
}

.settings-btn:hover {
  background: var(--surface-hover);
  transform: rotate(20deg);
  border-color: var(--accent);
  box-shadow: 0 0 10px rgba(79, 195, 247, 0.2);
}

.settings-panel {
  position: fixed;
  top: 0;
  right: 0;
  height: 100vh;
  width: 275px;
  background: var(--surface);
  border-left: 1px solid var(--border);
  border-top-left-radius: 16px;
  border-bottom-left-radius: 16px;
  box-shadow: -10px 0 30px rgba(0, 0, 0, 0.4);
  transform: translateX(100%);
  transition: transform 0.3s ease;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  z-index: 10000;
}

.settings-panel.open {
  transform: translateX(0);
}

.settings-content {
  padding: 20px;
  font-size: 0.85rem;
}

.settings-header {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 16px;
  color: var(--text);
}

.settings-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.settings-group.saved-summaries {
    margin-top: 100px;       /* reduce vertical spacing */
    padding-top: 2px;      /* remove extra top padding */
}

/* Tighten spacing under Saved Summaries title */
.settings-group.saved-summaries .settings-header {
    margin-bottom: 2px;  /* default might be bigger */
}

/* Tighten spacing between title and input */
.settings-group.saved-summaries .save-container {
    margin-top: 2px;     /* reduces gap */
}

.settings-option {
  font-size: 0.85rem;
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  overflow: visible;
  text-overflow: clip
}

.settings-option input {
  accent-color: var(--accent);
  cursor: pointer;
}

.settings-option.indent {
  margin-left: 20px;
}

#resetDefaultsBtn {
  width: calc(100% - 40px); /* leave 20px padding on each side */
  margin: 20px;
  padding: 10px 0;
  background-color: var(--text);  /* dark gray, consistent with panel borders */
  color: #2c2c2c;             /* text color matches theme */
  font-weight: 600;
  font-size: 0.95rem;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  text-align: center;             /* horizontally center text */
  display: block;                 /* ensures text-align works */
  line-height: 1.2; 
  transition: all 0.2s ease;
}

#resetDefaultsBtn:hover {
  background-color: #a1a4a7;  /* slightly lighter gray on hover */
}

/* LEFT PANEL BUTTON STYLE */
.left-panel-btn {
  position: fixed;
  top: 10px;
  left: 10px;
  width: 44px;
  height: 44px;
  border-radius: 10%;
  border: 1px solid var(--bg);
  background: var(--bg);
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10001;
  transition: all 0.2s ease;
}

.left-panel-btn:hover {
  background: var(--surface-hover);
  border-color: var(--accent);
  box-shadow: 0 0 10px rgba(79, 195, 247, 0.3);
}

/* LEFT PANEL STYLE */
.left-panel {
  position: fixed;
  top: 0;
  left: 0;
  height: 100vh;
  width: 150px;
  background: var(--bg);
  border-right: 1px solid var(--border);
  border-top-right-radius: 16px;
  border-bottom-right-radius: 16px;
  box-shadow: 10px 0 30px rgba(0, 0, 0, 0.4);
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 20px 10px;
  z-index: 10000;
  transform: translateX(-100%);
  transition: transform 0.3s ease;
}

/* When open */
.left-panel.open {
  transform: translateX(0);
}

.left-panel.open ~ .planner-container {
  margin-left: 120px; /* same as panel width */
}

.nav-btn {
  width: 100%;
  padding: 5px 0;
  background-color: var(--text);   /* same as reset button */
  color: #2c2c2c;
  font-weight: 700;
  font-size: 0.95rem;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s ease;
}

.nav-btn:first-child {
  margin-top: 60px;
}

/* Hover effect with blue ring */
.nav-btn:hover {
    box-shadow: 
    0 0 0 2px var(--accent), 
    0 0 8px rgba(79, 195, 247, 0.2); /* your accent color */
}

/* Active (selected page) */
.nav-btn.active {
  background-color: var(--text);   /* same gray as others */
  color: #2c2c2c;

  box-shadow: 
    0 0 0 2px var(--accent), 
    0 0 8px rgba(79, 195, 247, 0.6); /* same as hover glow */
}

/* Parser Paste Container */
.parser-paste-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 15px;
  margin-top: 15px;
  width: 50%;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

/* Textarea inside parser box */
.parser-paste-box textarea {
  width: 100%;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  font-family: Consolas, monospace;
  font-size: 14px;
  resize: vertical;
  box-sizing: border-box;
}

/* Button row */
.parser-button-row {
  margin-top: 10px;
  display: flex;
  gap: 10px;
}

/* Buttons */
.parser-button-row button {
  background: var(--text);
  border: none;
  border-radius: 8px;
  padding: 8px 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
}

/* Parser Button - Offensive Hover (Blue) */
.btn-offense:hover {
  box-shadow: 0 0 0 2px var(--accent);
}

/* Parser Button - Defensive Hover (Red) */
.btn-defense:hover {
  box-shadow: 0 0 0 2px #e05a5a;
}

/* Parser Output/Results Container */
.parser-results-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 15px;
  margin-top: 15px;
  width: 50%;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

/* Parser Output/Results Header */
.parser-results-header {
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--text);
}

/* Parser Results/Output textarea */
.parser-results-box textarea {
  width: 100%;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  font-family: Consolas, monospace;
  font-size: 14px;
  resize: vertical;
  box-sizing: border-box;
}

#output {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  font-family: Consolas, monospace;
  font-size: 13.5px;
  line-height: 1.45;
  white-space: pre-wrap;           /* crucial for preserving newlines and <br> */
  word-wrap: break-word;
  color: var(--text);
  min-height: 120px;
}

.details {
  display: none;
  margin: 8px 0 12px 0;
  padding: 10px 14px;
  border-left: 3px solid var(--accent);
  background: rgba(79, 195, 247, 0.08);   /* subtle blue tint */
  border-radius: 6px;
  font-size: 13px;
}

.prov-line {

  color: #a0d0ff;
  padding-left: 4px;
}

.expand-link {

  user-select: none;
}

.expand-link:hover {

}

.bold {

}

.underline {

}

.save-container {

    gap: 6px;
    align-items: center;
    margin: 6px 0;
}

#kingdomTag {

    color: var(--text);

    border-radius: 6px;
    font-family: inherit;
    font-size: 0.9rem;

/* When user clicks the input */

  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(79, 195, 247, 0.2);
}

#saveSummaryBtn {
    height: 24px;
    padding: 0 10px;
    background: var(--text);
    color: black;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s ease;
}

#saveSummaryBtn:hover {
    box-shadow: 0 0 0 2px var(--accent);
}

.saved-kingdoms {
    max-height: 180px;
    overflow-y: auto;
    margin-top: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;   /* centers buttons */

    padding: 4px 0;

.saved-kingdoms button.active-summary {

    border-left: 4px solid rgb(150, 46, 163);
    color: black

.saved-kingdoms button {
    height: 24px;
    padding: 0 28px 0 10px;

    color: black;

    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;

.saved-kingdoms button:hover {
    box-shadow: 0 0 0 2px var(--accent);
}

.saved-row {
    display: flex;
    justify-content: center;
    margin: 4px 0;
}

.delete-inside {
    position: absolute;
    right: 8px;
    top: 55%;

}

.delete-inside:hover {
    color: #ff6b5a;
}

.saved-kingdoms button:has(.delete-inside:hover) {
    box-shadow: none;

.saved-note {
    font-size: 11px;
    color: #888;
    text-align: center;
    margin-top: 6px;
    margin-bottom: 4px;
    width: 100%;
}

  const settingsBtn = document.getElementById('settingsBtn');

  settingsBtn.addEventListener('click', () => {
    settingsPanel.classList.toggle('open');

  // Close panel when clicking outside of it

      settingsPanel.classList.remove('open');

<script>
// BEST OF BOTH WORLDS: v1.3.7's rock-solid province extractor
function getTargetProvince(line) {
    let match;

    // 1. Try specific patterns first (keep your originals + add spell-specific ones)
    match = line.match(/lands of ([^()]+?)\s*\(\d+:\d+\)/i) ||
            line.match(/skies of ([^()]+?)\s*\(\d+:\d+\)/i) ||
            line.match(/guilds of ([^()]+?)\s*\(\d+:\d+\)/i) ||
            line.match(/over ([^()]+?)\s*\(\d+:\d+\)/i) ||
            line.match(/of them[.,]?\s+([^()]+?)\s*\(\d+:\d+\)/i) ||
            line.match(/to and from ([^()]+?)\s*\(\d+:\d+\)/i) ||
            line.match(/lands of our enemies.*?lands of ([^()]+?)\s*\(\d+:\d+\)/i) ||
            line.match(/gluttony of ([^()]+?)\s*\(\d+:\d+\)/i) ||
            line.match(/womenfolk of ([^()]+?)\s*\(\d+:\d+\)/i) ||
            line.match(/drought will reign over the lands of ([^()]+?)\s*\(\d+:\d+\)/i) ||
            line.match(/vow of chastity for \d+ days!\s*\(([^()]+?)\s*\(\d+:\d+\)\)/i) ||
            line.match(/soldiers to turn greedy for \d+ days\.\s*\(([^()]+?)\s*\(\d+:\d+\)\)/i) ||
			line.match(/Lightning strikes the Towers in ([^()]+?)\s*\(\d+:\d+\)/i);

    if (match && match[1]) {
        let prov = match[1].trim();

        // Aggressive cleanup (expanded list)
        prov = prov.replace(/\b(the|and|but|with|from|for|to|in|on|at|of|is|was|were|has|have|our|enemies|illuminated|exposed|thieves|that|walk|through|lands|gluttony|vow|chastity|drought|womenfolk|men|people|guilds|skies|over|increased|reign|taken|rock|haunt|scour|ravaged|much to the chagrin of their|a|an)\b/gi, ' ').trim();
        prov = prov.replace(/\s+/g, ' ').trim();

        if (prov.length > 2) {
            const kingdom = line.match(/\(\d+:\d+\)/)[0];
            return prov + " " + kingdom;
        }
    }

    // 2. Ultimate fallback: smarter extraction of province just before the kingdom tag
    const kingdomMatch = line.match(/\(\d+:\d+\)/);
    if (!kingdomMatch) return "Unknown";

    const before = line.substring(0, kingdomMatch.index).trim();

    // Try to find province-like name right before the kingdom
    let fallback = before.match(/([A-Za-z][\w\s'&.-]{2,})\s*$/i);  // last word group

    if (fallback && fallback[1]) {
        let prov = fallback[1].trim();

        // Extra cleanup for fallback cases
        prov = prov.replace(/\b(the|and|but|with|from|for|to|in|on|at|of|is|was|were|has|have|our|enemies|gluttony|vow|chastity|drought|womenfolk|men|people|a|an|the)\b/gi, ' ').trim();
        prov = prov.replace(/^\s*(of|the|in|a|an)\s+/gi, '').trim();
        prov = prov.replace(/\s+(of|the|in|a|an)\s*$/gi, '').trim();
        prov = prov.replace(/\s+/g, ' ').trim();

        if (prov.length > 2) {
            return prov + " " + kingdomMatch[0];
        }
    }

    return "Unknown";
}

function parseLog(mode = 'offensive') {
    const text = document.getElementById('input').value.trim();
    if (!text) return alert("Paste your log!");

    document.getElementById('output').innerHTML = ''; // clear previous content

    // Reset
    Object.keys(c).forEach(k => c[k] = 0);
    Object.keys(hits).forEach(k => hits[k] = []);
    Object.keys(perTarget).forEach(k => perTarget[k].clear());

    text.split('\n').forEach(origLine => {
        const line = origLine.toLowerCase().trim();
        if (!line) return;

        const target = getTargetProvince(origLine);

        // Failures
        if (line.includes("spell fails") || line.includes("fizzles")) {
			// Check if the trimmed original line ends with (Province (X:Y))
			const trimmed = origLine.trim();
			const hasTargetProvince = /\(\s*[^()]+\s*\(\d+:\d+\)\s*\)$/i.test(trimmed);

			if (hasTargetProvince) {
				c.spellAttempts++;
			}
		}
        if (line.includes("foiled") || line.includes("caught") || (line.includes("lost") && line.includes("thieves"))) c.thiefAttempts++;

        // Successful spells
        if (/spell succeeds/i.test(line) && !/reflected/i.test(line)) {
			// Check if the trimmed original line ends with (Province (X:Y))
			const trimmed = origLine.trim();
			const hasTargetProvince = /\(\s*[^()]+\s*\(\d+:\d+\)\s*\)$/i.test(trimmed);

			if (hasTargetProvince) {
				c.spellAttempts++;
				c.spellSuccess++;
			}
		}

		// DEFENSIVE: ATTACKS SUFFERED
		if (line.includes("came through and ravaged our lands") || 
		    line.includes("forces from") && line.includes("captured") && line.includes("acres") && 
		    (line.includes("lost") || line.includes("killed"))) {
			
			c.attacksSuffered++;

			// Acres lost (captured by enemy)
			const acresMatch = origLine.match(/captured\s+(\d[\d,]*)\s+acres/i);
			if (acresMatch) {
				const acres = parseInt(acresMatch[1].replace(/,/g, ''), 10);
				c.acresLost += acres;
			}

			// Soldiers lost
			const soldiersMatch = origLine.match(/lost\s+(\d[\d,]*)\s+soldiers/i);
			if (soldiersMatch) {
				const soldiers = parseInt(soldiersMatch[1].replace(/,/g, ''), 10);
				c.soldiersLost += soldiers;
			}

			// Troops/specialists lost (everything after soldiers, before "in this battle")
			// This catches Archers, Knights, etc. — sum all numbers that look like troop losses
			let extraTroops = 0;
			const troopNumbers = origLine.matchAll(/(\d[\d,]*)\s+(?!soldiers)(?!peasants)([A-Za-z\s]+?)(?:,| and |!|$)/gi);
			for (const m of troopNumbers) {
				extraTroops += parseInt(m[1].replace(/,/g, ''), 10);
			}
			c.troopsLost += extraTroops;
		}
		
		// DEFENSIVE: FAILED INCOMING SABOTAGE OPS
		if (line.includes("we have found thieves") && 
		    (line.includes("causing trouble within our lands") || line.includes("causing trouble within our lands!"))) {
			
			c.thiefAttemptsOnUs++;
			c.thiefFailsOnUs++;
		}
		
		// DEFENSIVE: FAILED INCOMING SORCERY OPS
		if (line.includes("our mages noticed a possible spell attempt") && 
		    line.includes("causing trouble on our lands")) {
			
			c.sorceryAttemptsOnUs++;
			c.sorceryFailsOnUs++;
		}

		// 1. ABOLISH RITUAL
		if (/infest the guilds/i.test(line) && /ritual is now.*% destroyed/i.test(line)) {
            c.spellAttempts++; c.spellSuccess++; c.abolish++;
            
            let abolishTarget = target;
            const guildsMatch = origLine.match(/guilds of ([^()]+?)\s*\(\d+:\d+\)/i);
            if (guildsMatch) {
                const prov = guildsMatch[1].trim();
                const kingdom = origLine.match(/\(\d+:\d+\)/)[0];
                abolishTarget = prov + " " + kingdom;
            }

            if (!perTarget.abolish.has(abolishTarget)) perTarget.abolish.set(abolishTarget,{c:0,t:0});
            perTarget.abolish.get(abolishTarget).c++;

            const v = 2;  // Each cast destroys 2%
            c.abolishPct += v;
            hits.abolish.push(v);
            perTarget.abolish.get(abolishTarget).t += v;
        }

    if (c.sorceryAttemptsOnUs > 0) {
        hasAnyDefensiveEvent = true;

        const successes = c.sorceryAttemptsOnUs - c.sorceryFailsOnUs;
        const successPct = c.sorceryAttemptsOnUs > 0 
            ? Math.round((successes / c.sorceryAttemptsOnUs) * 100) 
            : 0;

        out += `<span class="bold underline">Sorcery Ops (${successes}/${c.sorceryAttemptsOnUs} - ${successPct}%):</span>\n`;
  
    }
	
	// Meteor Showers
    if (c.meteorDefCasts > 0 || c.meteorDefPeasantsKilled > 0 || c.meteorDefSoldiersKilled > 0 || c.meteorDefTroopsKilled > 0) {
        out += `Meteor Showers: ${c.meteorDefCasts} - Total Days: ${c.meteorDefDays.toLocaleString()} (Avg: ${c.meteorDefCasts ? Math.round(c.meteorDefDays / c.meteorDefCasts) : 0})\n`;
        out += `<div class="details">`;

        if (c.meteorDefPeasantsKilled > 0 || c.meteorDefSoldiersKilled > 0 || c.meteorDefTroopsKilled > 0) {
            if (c.meteorDefPeasantsKilled > 0) {
                out += ` - Peasants killed: ${c.meteorDefPeasantsKilled.toLocaleString()}\n`;
            }
            if (c.meteorDefSoldiersKilled > 0) {
                out += ` - Soldiers killed: ${c.meteorDefSoldiersKilled.toLocaleString()}\n`;
            }
            if (c.meteorDefTroopsKilled > 0) {
                out += ` - Troops killed: ${c.meteorDefTroopsKilled.toLocaleString()}\n`;
            }
        } else {
            out += ` - No damage from meteor ticks recorded\n`;
        }

        out += `</div>`;
    } else {
        out += `(No incoming meteor shower activity detected)\n`;
    }

	// Fireball
    if (c.fireballDefCasts > 0 || c.fireballDefPeasantsKilled > 0) {
        hasAnyDefensiveSorcery = true;
        out += `Fireballs: ${c.fireballDefCasts} - Peasants Killed: ${c.fireballDefPeasantsKilled.toLocaleString()}`;
        if (c.fireballDefCasts > 0) {
            out += ` (Avg: ${Math.round(c.fireballDefPeasantsKilled / c.fireballDefCasts).toLocaleString()})`;
        }
        out += `\n`;
    }

	// Chastity
    if (c.chastityDefCasts > 0 || c.chastityDefDays > 0) {
        hasAnyDefensiveSorcery = true;
        out += `Chastity: ${c.chastityDefCasts} - Total Days: ${c.chastityDefDays.toLocaleString()}`;
        if (c.chastityDefCasts > 0) {
            out += ` (Avg: ${Math.round(c.chastityDefDays / c.chastityDefCasts)})`;
        }
        out += `\n`;
    }
	
	// Gluttony
    if (c.gluttonyDefCasts > 0 || c.gluttonyDefDays > 0) {
        hasAnyDefensiveSorcery = true;
        out += `Gluttony: ${c.gluttonyDefCasts} - Total Days: ${c.gluttonyDefDays.toLocaleString()}`;
        if (c.gluttonyDefCasts > 0) {
            out += ` (Avg: ${Math.round(c.gluttonyDefDays / c.gluttonyDefCasts)})`;
        }
        out += `\n`;
    }
	
	// Greed
	if (c.greedDefCasts > 0 || c.greedDefDays > 0) {
		hasAnyDefensiveSorcery = true;
		out += `Greed: ${c.greedDefCasts} - Total Days: ${c.greedDefDays.toLocaleString()}`;
		if (c.greedDefCasts > 0) {
			out += ` (Avg: ${Math.round(c.greedDefDays / c.greedDefCasts)})`;
		}
		out += `\n`;
	}
	
	// Pitfalls
	if (c.pitfallsDefCasts > 0 || c.pitfallsDefDays > 0) {
		hasAnyDefensiveSorcery = true;
		out += `Pitfalls: ${c.pitfallsDefCasts} - Total Days: ${c.pitfallsDefDays.toLocaleString()}`;
		if (c.pitfallsDefCasts > 0) {
			out += ` (Avg: ${Math.round(c.pitfallsDefDays / c.pitfallsDefCasts)})`;
		}
		out += `\n`;
	}
	
	// Expose Thieves
    if (c.exposeThievesDefCasts > 0 || c.exposeThievesDefDays > 0) {
        hasAnyDefensiveSorcery = true;
        out += `Expose Thieves: ${c.exposeThievesDefCasts} - Total Days: ${c.exposeThievesDefDays.toLocaleString()}`;
        if (c.exposeThievesDefCasts > 0) {
            out += ` (Avg: ${Math.round(c.exposeThievesDefDays / c.exposeThievesDefCasts)})`;
        }
        out += `\n`;
    }
	
out += `\n`;
	
	// Sabotage Ops
    if (c.thiefAttemptsOnUs > 0) {
        hasAnyDefensiveEvent = true;

        // Calculate successes = total attempts - fails
        const successes = c.thiefAttemptsOnUs - c.thiefFailsOnUs;
        
        // Enemy success percentage
        const successPct = c.thiefAttemptsOnUs > 0 
            ? Math.round((successes / c.thiefAttemptsOnUs) * 100) 
            : 0;

        // Display: successes / total - % enemy success
        out += `<span class="bold underline">Sabotage Ops (${successes}/${c.thiefAttemptsOnUs} - ${successPct}%):</span>\n`;
  
    }
	
	// Incite Riots
    if (c.riotsDefCasts > 0 || c.riotsDefDays > 0) {
        hasAnyDefensiveSorcery = true;
        out += `Incite Riots: ${c.riotsDefCasts} - Total Days: ${c.riotsDefDays.toLocaleString()}`;
        if (c.riotsDefCasts > 0) {
            out += ` (Avg: ${Math.round(c.riotsDefDays / c.riotsDefCasts)})`;
        }
        out += `\n`;
    }
	
	// Gold Stolen
    if (c.vaultRobDefCount > 0 || c.goldStolenFromUs > 0) {
        out += `Vaults Robbed: ${c.vaultRobDefCount} - Gold Stolen: ${c.goldStolenFromUs.toLocaleString()} gc`;
        if (c.vaultRobDefCount > 0) {
            out += ` (Avg: ${Math.round(c.goldStolenFromUs / c.vaultRobDefCount).toLocaleString()})`;
        }
        out += `\n`;
    }
		
	// Runes Stolen
    if (c.towerRobDefCount > 0 || c.runesStolenFromUs > 0) {
        hasAnyDefensiveEvent = true;

        out += `Towers Robbed: ${c.towerRobDefCount} - Runes Stolen: ${c.runesStolenFromUs.toLocaleString()} Runes`;
        if (c.towerRobDefCount > 0) {
            out += ` (Avg: ${Math.round(c.runesStolenFromUs / c.towerRobDefCount).toLocaleString()})`;
        }
        out += `\n`;
    }

    // Fallback if absolutely nothing
    if (!hasAnyDefensiveSorcery && c.attacksSuffered === 0) {
        out += `(No defensive events detected in this log)\n`;
    }

    out += `\n`;
}

    // Common footer for both mode
    out += `
    <div style="text-align: right; margin: 16px 0 8px 0;">
      <span class="expand-link" onclick="toggleAllDetails(this)">Expand for more details</span>
    </div>`;

    document.getElementById('output').innerHTML = out;

    // Collapse all details by default
    document.querySelectorAll('#output .details').forEach(d => d.style.display = 'none');
}

function toggleAllDetails(link) {
  const details = document.querySelectorAll('#output .details');
  const isCollapsed = Array.from(details).every(d => d.style.display !== 'block');

  details.forEach(d => {
    d.style.display = isCollapsed ? 'block' : 'none';
  });

  link.textContent = isCollapsed ? 'Collapse details' : 'Expand for more details';
}

function toggleDetails(link) {
    const details = document.querySelectorAll('.details');
    let expanded = false;

    details.forEach(d => {
        if (d.style.display === 'block') expanded = true;
    });

    details.forEach(d => {
        d.style.display = expanded ? 'none' : 'block';
    });

    link.innerHTML = expanded ? 'Expand for More Details' : 'Collapse Details';
}

function copyOutput() {
    navigator.clipboard.writeText(document.getElementById('output').textContent);
    alert("Copied!");
}
function goToPage(page) {
    window.location.href = page;
}

// Saved summaries storage (kingdomTag → summary HTML)
let savedSummaries = JSON.parse(localStorage.getItem('utopiaParserSummaries')) || {};

// Render saved kingdom buttons
function renderSavedKingdoms() {
    const container = document.getElementById('savedKingdoms');
    container.innerHTML = '';

    Object.keys(savedSummaries).sort().forEach(tag => {
        const row = document.createElement('div');
        row.className = 'saved-row';

        const btn = document.createElement('button');
        btn.dataset.tag = tag;
        btn.innerHTML = `${tag} War Summary <span class="delete-inside">×</span>`;
    
        btn.onclick = (e) => {
            // If delete button clicked
            if (e.target.classList.contains('delete-inside')) {
            e.stopPropagation();

                if (confirm(`Delete saved summary for ${tag}?`)) {
                    delete savedSummaries[tag];
                    localStorage.setItem('utopiaParserSummaries', JSON.stringify(savedSummaries));
                    renderSavedKingdoms();
                }
                return;
            }

            // Otherwise load summary
            document.getElementById('output').innerHTML = savedSummaries[tag];

            document.querySelectorAll('.details').forEach(d => d.style.display = 'none');
            updateExpandLink();

            document.querySelectorAll('.saved-kingdoms button').forEach(b => {
                b.classList.remove('active-summary');
            });
            btn.classList.add('active-summary');
        };

        row.appendChild(btn);
        container.appendChild(row);
    });

    // If none saved
    if (Object.keys(savedSummaries).length === 0) {
        container.innerHTML = '<span style="color:#888;">No saved summaries yet</span>';
    }
}

// Update expand link text after loading saved content
function updateExpandLink() {
    const link = document.querySelector('.expand-link');
    if (link) {
        const anyVisible = document.querySelector('.details[style*="block"]');
        link.innerHTML = anyVisible ? 'Collapse Details' : 'Expand for More Details';
    }
}

// Save current summary
document.getElementById('saveSummaryBtn').onclick = () => {
    const tagInput = document.getElementById('kingdomTag');
    let tag = tagInput.value.trim().toUpperCase();

    // Basic validation: expect format like 1:1, 10:20, etc.
    if (!/^\d+:\d+$/.test(tag)) {
        alert("Please enter a valid kingdom tag (e.g. 3:10)");
        return;
    }

    const currentSummary = document.getElementById('output').innerHTML;
    if (!currentSummary || currentSummary.includes("Summary will appear here")) {
        alert("Generate a summary first!");
        return;
    }

    savedSummaries[tag] = currentSummary;
    localStorage.setItem('utopiaParserSummaries', JSON.stringify(savedSummaries));

    tagInput.value = ''; // clear input
    renderSavedKingdoms();
    alert(`Saved summary for ${tag}`);
};

// Load saved summaries on page load
window.addEventListener('load', () => {
    renderSavedKingdoms();
});

// Clear Saved Summaries Button
document.getElementById('resetDefaultsBtn').onclick = () => {
    // Clear saved summaries
    localStorage.removeItem('utopiaParserSummaries');
    savedSummaries = {};
    renderSavedKingdoms();

    alert("Settings reset and saved summaries cleared.");
};

</script>

</script>
