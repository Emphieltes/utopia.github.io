<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200">
  <title>Utopia Buildings</title>

  <style>
    :root {
      --bg: #32373b;
      --text: #e0e0e0;
      --text-muted: #a0a0a0;
      --surface: #3a3f44;
      --surface-hover: #43484e;
      --border: #4a5057;
      --accent: #4fc3f7;
      --accent-dark: #3aa0d8;
      --success: #4ade80;
      --danger: #ff6b6b;
      --warning: #ff9f43;
      --gold: #d4af37;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html, body {
        margin: 0;
        padding: 0;
        box-sizing: border-box; /* ensures no padding/margin surprises */
        width: 100%;
        min-height: 100vh;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      overflow-x: auto;
    }

    /* Main Content */
    .planner-container {
      padding-top: 10px;     /* Moves everything ↑ or ↓ */
      padding-right: 40px;
      padding-bottom: 40px;
      padding-left: 60px;    /* Moves everything ← or →  right */
      max-width: none;
      margin: 0;
      transition: margin-left 0.3s ease;
    }

    /* Header/Title Section */
    .header-section {
    margin-left: 0px;
    }

    h1 {
      color: var(--text);
      margin: 0 0 8px 0;
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

/* Settings Button */
.settings-btn {
  position: fixed;
  top: 16px;
  right: 20px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1px solid var(--bg);
  background: var(--bg);
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10001;

  transition: all 0.2s ease;
}

/* Settings Button Hover Effect*/
.settings-btn:hover {
  background: var(--surface-hover);
  transform: rotate(20deg);
  border-color: var(--accent);
  box-shadow: 0 0 10px rgba(79, 195, 247, 0.2);
}

/* Settings Panel */
.settings-panel {
  position: fixed;
  top: 0;
  right: 0;
  height: 100vh;
  width: 275px;
  background: var(--surface);
  border-left: 1px solid var(--border);
  border-top-left-radius: 16px;
  border-bottom-left-radius: 16px;
  box-shadow: -10px 0 30px rgba(0, 0, 0, 0.4);
  transform: translateX(100%);
  transition: transform 0.3s ease;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  z-index: 10000;
}

/* Settings Panel Open */
.settings-panel.open {
  transform: translateX(0);
}

/* Settings Panel Content */
.settings-content {
  padding: 20px;
  font-size: 0.85rem;
}

/* Settings Panel Header/Title */
.settings-header {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 16px;
  color: var(--text);
}

/* Reset to Defaults Button (In Settings Panel)*/
#resetDefaultsBtn {
  width: calc(100% - 40px);
  margin: 20px;
  padding: 10px 0;
  background-color: var(--text);  
  color: #2c2c2c;             
  font-weight: 600;
  font-size: 0.95rem;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  text-align: center;             
  display: block;                 
  line-height: 1.2; 
  transition: all 0.2s ease;
}

/* Reset to Defaults Button (Hover Effect)*/
#resetDefaultsBtn:hover {
  background-color: #a1a4a7;
}

/* Left Panel Button */
.left-panel-btn {
  position: fixed;
  top: 10px;
  left: 10px;
  width: 44px;
  height: 44px;
  border-radius: 10%;
  border: 1px solid var(--bg);
  background: var(--bg);
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10001;
  transition: all 0.2s ease;
}

/* Left Panel Button Hover Effect */
.left-panel-btn:hover {
  background: var(--surface-hover);
  border-color: var(--accent);
  box-shadow: 0 0 10px rgba(79, 195, 247, 0.3);
}

/* Left Panel */
.left-panel {
  position: fixed;
  top: 0;
  left: 0;
  height: 100vh;
  width: 150px;
  background: var(--bg);
  border-right: 1px solid var(--border);
  border-top-right-radius: 16px;
  border-bottom-right-radius: 16px;
  box-shadow: 10px 0 30px rgba(0, 0, 0, 0.4);
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 20px 10px;
  z-index: 10000;
  transform: translateX(-100%);
  transition: transform 0.3s ease;
}

/* Left Panel Open */
.left-panel.open {
  transform: translateX(0);
}

.left-panel.open ~ .planner-container {
  margin-left: 120px; /* same as panel width */
}

/* Left Panel Inner Button Settings */
.nav-btn {
  width: 100%;
  padding: 5px 0;
  background-color: var(--text);
  color: #2c2c2c;
  font-weight: 700;
  font-size: 0.95rem;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s ease;
}

.nav-btn:first-child {
  margin-top: 60px;
}

/* Left Panel Inner Button (Hover Effect) */
.nav-btn:hover {
    box-shadow: 
    0 0 0 2px var(--accent), 
    0 0 8px rgba(79, 195, 247, 0.2); /* your accent color */
}

/* Left Panel Inner Button - Active (selected page) */
.nav-btn.active {
  background-color: var(--text);
  color: #2c2c2c;

  box-shadow: 
    0 0 0 2px var(--accent), 
    0 0 8px rgba(79, 195, 247, 0.6); /* same as hover glow */
}

/* Buildings container */
.build-container {
    width: 100%;
    max-width: none;
    margin: 0;
    background: var(--surface);
    padding: 15px 20px;
    border-radius: 10px;
    border: 1px solid #4a5057;
}

.build-grid {
    width: fit-content;
    display: flex;
    grid-auto-flow: column;
    grid-template-rows: repeat(2, auto);
    grid-auto-columns: max-content;
    gap: 4px;
}

.build-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
}

.build-top {
    gap: 6px;
}

.build-top label {
    display: inline-block;
    text-align: right;
    white-space: nowrap;
    font-size: 0.85rem;
}

.build-item input {
    width: 50px;
    padding: 4px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    border-radius: 6px;
    text-align: center;
    height: 20px;
}

.total-box {
    margin-top: 10px;
    font-weight: bold;
    font-size: 1.1rem;
}

.be-container {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    font-size: 0.95rem;
    font-weight: 600;
}

.be-container input {
    width: 70px;
    padding: 4px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    border-radius: 6px;
    text-align: center;
    height: 20px;    
}

.build-effects {
    font-size: 0.62rem;
    color: #8fa6c9;    
    font-style: italic;    
    line-height: 1.25;
    white-space: normal;
    min-height: 40px;
    width: 0;
    min-width: max-content;
}

.build-effects div {
    white-space: nowrap;
}

.build-column {
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: flex-start;
    flex: 0 0 auto;
}

.b-Homes .build-top label { width: 58px; }
.b-Hospitals .build-top label { width: 58px; }
.b-Farms .build-top label { width: 37px; }
.b-Guilds .build-top label { width: 37px; }
.b-Mills .build-top label { width: 44px; }
.b-Towers .build-top label { width: 44px; }
.b-Banks .build-top label { width: 84px; }
.b-ThievesDens .build-top label { width: 84px; }
.b-TrainingGrounds .build-top label { width: 105px; }
.b-WatchTowers .build-top label { width: 105px; }
.b-Armouries .build-top label { width: 71px; }
.b-Universities .build-top label { width: 71px; }
.b-Barracks .build-top label { width: 53px; }
.b-Libraries .build-top label { width: 53px; }
.b-Forts .build-top label { width: 45px; }
.b-Stables .build-top label { width: 45px; }
.b-Castles .build-top label { width: 64px; }
.b-Dungeons .build-top label { width: 64px; }

.col-0 .build-effects,
.col-1 .build-effects,
.col-2 .build-effects,
.col-3 .build-effects,
.col-4 .build-effects,
.col-5 .build-effects,
.col-6 .build-effects,
.col-7 .build-effects,
.col-8 .build-effects {
    margin-left: 0;
}

.col-0 .build-effects { padding-left: 63px; }
.col-1 .build-effects { padding-left: 42px; }
.col-2 .build-effects { padding-left: 49px; }
.col-3 .build-effects { padding-left: 89px; }
.col-4 .build-effects { padding-left: 110px; }
.col-5 .build-effects { padding-left: 76px; }
.col-6 .build-effects { padding-left: 58px; }
.col-7 .build-effects { padding-left: 50px; }
.col-8 .build-effects { padding-left: 69px; }

.cap-display {
    font-size: 0.65rem;
    color: #9ca3af;
    white-space: nowrap;
    margin-left: 4px;
}
	
  </style>
</head>

      dateSpan.textContent = d.toLocaleString('en-CA', {
        year: 'numeric', month: 'short', day: 'numeric',

<script>
  const leftBtn = document.getElementById('leftPanelBtn');
  const leftPanel = document.querySelector('.left-panel');

  // Load saved state on page load
  if (localStorage.getItem('leftPanelOpen') === 'true') {
    leftPanel.classList.add('open');
  }

  // Toggle and save state
  leftBtn.addEventListener('click', () => {
    leftPanel.classList.toggle('open');

    const isOpen = leftPanel.classList.contains('open');
    localStorage.setItem('leftPanelOpen', isOpen);
  });
</script>

<script>
// ==== SETTINGS PANEL TOGGLE (CLEAN) ====
const settingsBtn = document.getElementById('settingsBtn');
const settingsPanel = document.getElementById('settingsPanel');

// Toggle settings panel
settingsBtn.addEventListener('click', (e) => {
  settingsPanel.classList.toggle('open');
  e.stopPropagation();
});

// Close panel when clicking outside
document.addEventListener('click', (e) => {
  if (settingsPanel.classList.contains('open')) {
    const clickedOutside =
      e.target !== settingsPanel &&
      !settingsPanel.contains(e.target) &&
      e.target !== settingsBtn;

    if (clickedOutside) {
      settingsPanel.classList.remove('open');
    }
  }
});
</script>

// === BUILDING EFFECT CAPS ===
const buildingCaps = {
    "Banks": { "Income": 37.5 },
    "Training Grounds": { "OME": 37.5, "Training Time": 25 },
    "Armouries": { "Train Costs": 37.5, "Wages/Draft Costs": 50 },

// === BUILD GRID ===
function buildBuildingGrid() {

    const grid = document.getElementById('buildGrid');
    grid.innerHTML = '';

    for (let i = 0; i < buildings.length; i += 2) {

        const column = document.createElement('div');
        column.className = `build-column col-${i / 2}`;

        for (let j = i; j < i + 2 && j < buildings.length; j++) {

            const name = buildings[j];

            const item = document.createElement('div');
            item.className = `build-item b-${name.replace(/[^a-zA-Z]/g, '')}`;

            item.innerHTML = `
                <div class="build-top">

                    <label>${name}:</label>

                    <input type="number"
                        min="0"
                        max="100"
                        id="b${j}"
                        value="0">

                    <span class="cap-display" id="cap${j}">
                        --
                    </span>

                </div>

                <div class="build-effects" id="effect${j}">
                    --
                </div>
            `;

            column.appendChild(item);
        }

        grid.appendChild(column);
    }

    attachListeners();
}

// === CALCULATE TOTAL ===
function calculateBuildTotal() {
    let total = 0;

    buildings.forEach((_, i) => {
        const val = parseFloat(document.getElementById(`b${i}`).value) || 0;
        total += val;
    });

    const totalEl = document.getElementById('buildTotal');

    const remaining = 100 - total;
    totalEl.textContent = `${total.toFixed(0)}% (Remaining: ${remaining.toFixed(0)}%)`;

    // Color feedback
    if (total === 100) {
        totalEl.style.color = '#4ade80';
    } else if (total > 100) {
        totalEl.style.color = '#ff6b6b';
    } else {
        totalEl.style.color = '#ff9f43';
    }
}

function calculateBuildingEffects() {
    const be = (parseFloat(document.getElementById('beInput').value) || 100) / 100;
    const land = parseFloat(document.getElementById('landInput').value) || 0;

    buildings.forEach((name, i) => {
        const effectEl = document.getElementById(`effect${i}`);
        const input = document.getElementById(`b${i}`);
        const data = buildingEffects[name];

        if (!data) {
            effectEl.innerHTML = '--';
            return;
        }

        let percent = parseFloat(input.value) || 0;
        if (percent > 50) percent = 50;

        const buildingAcres = land * (percent / 100);

        let html = '';
        let buildingCapPercent = null;

        data.effects.forEach(effectData => {

            const effectName = effectData.text.trim();
            const caps = buildingCaps[name] || {};
            const maxEffect = caps[effectName];

            let bonus = 0;
            let capPercent = null;
            let isCapped = false;

            // ======================
            // FLAT EFFECTS
            // ======================
            if (effectData.type === 'flat') {

                const usesBE = effectData.usesBE ?? true;
                const modifier = usesBE ? be : 1;

                bonus = buildingAcres * effectData.base * modifier;

                html += `
                    <div>
                        +${Math.round(bonus).toLocaleString()} ${effectName}
                    </div>
                `;
            }

            // ======================
            // PERCENT EFFECTS
            // ======================
            else if (effectData.type === 'percent') {

                const usesBE = effectData.usesBE ?? true;
                const modifier = usesBE ? be : 1;

                const raw = (percent * (100 - percent) * effectData.base * modifier) / 100;

                bonus = raw;

                // ======================
                // CAP LOGIC (FIXED)
                // ======================
                if (maxEffect !== undefined) {

                    const discriminant =
                        10000 -
                        ((400 * Math.abs(maxEffect)) /
                        (Math.abs(effectData.base) * modifier));

                    if (discriminant >= 0) {
                        capPercent =
                            (100 - Math.sqrt(discriminant)) / 2;
                    }

                    if (Math.abs(raw) >= Math.abs(maxEffect)) {
                        bonus = maxEffect;
                        isCapped = true;
                    }
                }

                // Track highest cap per building
                if (capPercent !== null) {
                    buildingCapPercent = Math.max(
                        buildingCapPercent ?? 0,
                        capPercent
                    );
                }

                const sign = bonus >= 0 ? '+' : '';
                const color = isCapped ? 'color:#ff6b6b;font-weight:bold;' : '';

                html += `
                    <div style="${color}">
                        ${sign}${bonus.toFixed(2)}% ${effectName}
                    </div>
                `;
            }
        });

        const capEl = document.getElementById(`cap${i}`);

        if (buildingCapPercent !== null) {
            capEl.textContent = `(${buildingCapPercent.toFixed(1)}%)`;
        } else {
            capEl.textContent = '';
        }

        effectEl.innerHTML = html;
    });
}

// === LISTENERS ===
function attachListeners() {
    buildings.forEach((_, i) => {
        const input = document.getElementById(`b${i}`);

        input.addEventListener('input', () => {
            calculateBuildTotal();
            calculateBuildingEffects();
            saveBuildings();
        });
    });
}

// === RESET BUILD ===
function resetBuildings() {
    // Clear inputs
    buildings.forEach((_, i) => {
        const input = document.getElementById(`b${i}`);
        input.value = 0;
    });

    // Clear saved data
    localStorage.removeItem('utopiaBuildings');

    // Recalculate total
    calculateBuildTotal();
}

// === SAVE BUILD ===
function saveBuildings() {
    const data = {};

    buildings.forEach((_, i) => {
        const input = document.getElementById(`b${i}`);
        data[i] = input.value;
    });

    localStorage.setItem('utopiaBuildings', JSON.stringify(data));
}

// === LOAD BUILD ===
function loadBuildings() {
    const data = JSON.parse(localStorage.getItem('utopiaBuildings'));

    if (!data) return;

    buildings.forEach((_, i) => {
        const input = document.getElementById(`b${i}`);
        if (data[i] !== undefined) {
            input.value = data[i];
        }
    });
}

// INIT
window.addEventListener('load', () => {
    buildBuildingGrid();
    loadBuildings();
    calculateBuildTotal();    

    // === SAVE / LOAD BE AND ACRES ===
    const beInput = document.getElementById('beInput');
    const landInput = document.getElementById('landInput');

    // Load saved values
    const savedBE = localStorage.getItem('utopiaBE');
    if (savedBE) beInput.value = savedBE;

    const savedAcres = localStorage.getItem('utopiaTotalAcres');
    if (savedAcres) landInput.value = savedAcres;

    calculateBuildingEffects();

    // Save on any change
    beInput.addEventListener('input', () => {
        localStorage.setItem('utopiaBE', beInput.value);
        calculateBuildingEffects();
    });

    landInput.addEventListener('input', () => {
        localStorage.setItem('utopiaTotalAcres', landInput.value);
        calculateBuildingEffects();
    });

    // RESET BUTTON HOOK
    document.getElementById('resetDefaultsBtn')
        .addEventListener('click', resetBuildings);

    // === BUILD EFFECTS TOGGLE ===
    const toggleEffects = document.getElementById('toggle-effects');

    // Load saved setting
    const savedState =
        localStorage.getItem('buildingEffectsEnabled') !== 'false';

    toggleEffects.checked = savedState;

    // Apply visibility immediately
    document.querySelectorAll('.build-effects').forEach(el => {
        el.style.display = savedState ? 'block' : 'none';
    });

    // Toggle visibility
    toggleEffects.addEventListener('change', () => {

        const isChecked = toggleEffects.checked;

        document.querySelectorAll('.build-effects').forEach(el => {
            el.style.display = isChecked ? 'block' : 'none';
        });

        localStorage.setItem('buildingEffectsEnabled', isChecked);
    });
});
</script>
